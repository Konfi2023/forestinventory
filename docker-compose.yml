# HINWEIS: Auf dem Produktionsserver liegt die Docker-Infrastruktur
# unter /var/www/forestinventory/docker-compose.yml.
# Diese Datei dient auch als Vorlage für die Produktion.

services:
  postgres:
    image: postgres:15-alpine
    container_name: forestdb_db
    restart: always
    environment:
      POSTGRES_USER: forestuser
      POSTGRES_PASSWORD: forestpassword
      POSTGRES_DB: forestdb
    ports:
      - "5432:5432"
    volumes:
      - forest_db_data:/var/lib/postgresql/data

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: forestdb_pgbouncer
    restart: always
    depends_on:
      - postgres
    environment:
      DB_HOST: forestdb_db
      DB_PORT: "5432"
      DB_USER: forestuser
      DB_PASSWORD: forestpassword
      DB_NAME: forestdb
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: forestdb_auth
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://forestdb_db:5432/forestdb
      KC_DB_USERNAME: forestuser
      KC_DB_PASSWORD: forestpassword
      KC_DB_SCHEMA: public
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8080
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
      - ./src/keycloak-theme/forest-dark:/opt/keycloak/themes/forest-dark
    depends_on:
      - postgres

  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: forestdb_backup
    restart: always
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: forestdb_db
      POSTGRES_DB: forestdb
      POSTGRES_USER: forestuser
      POSTGRES_PASSWORD: forestpassword
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "7"
      BACKUP_KEEP_WEEKS: "4"
    volumes:
      - ./backups:/backups

volumes:
  forest_db_data:
