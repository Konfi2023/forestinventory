version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: forest_db
    restart: always
    environment:
      POSTGRES_USER: forest_user
      POSTGRES_PASSWORD: forest_password
      POSTGRES_DB: forest_inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: forest_pgbouncer
    restart: always
    depends_on:
      - postgres
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: forest_user
      POSTGRESQL_PASSWORD: forest_password
      POSTGRESQL_DATABASE: forest_inventory
      PGBOUNCER_PORT: 6432
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:6432"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: forest_iam
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - C:/Users/Aschkan/forestinventory/keycloak:/opt/keycloak/data/import
      - C:/Users/Aschkan/forestinventory/src/keycloak-theme/forest-dark:/opt/keycloak/themes/forest-dark

volumes:
  postgres_data:
  keycloak_data:
